version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: kanban
      POSTGRES_USER: kanban
      POSTGRES_PASSWORD: kanban
    ports:
      - '5432:5432'

  redis:
    image: redis:7
    ports:
      - '6379:6379'

  backend:
    build: ./backend
    environment:
      PORT: 4000
      JWT_SECRET: dev-secret
      DATABASE_URL: postgres://kanban:kanban@postgres:5432/kanban
      UPLOAD_DIR: /app/uploads
    ports:
      - '4000:4000'
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    ports:
      - '3000:3000'
    depends_on:
      - backend
